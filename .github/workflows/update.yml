name: Auto Update README

on:
  # 1. 定时触发：每天 UTC 时间凌晨 2点 运行 (北京时间上午 10点)
  schedule:
    - cron: '0 2 * * *'
  # 2. 手动触发：允许你在 GitHub 网页上点个按钮立刻运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的 Ubuntu 虚拟机

    steps:
      # 第 1 步：拉取你的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第 2 步：配置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用稳定的 Python 版本

      # 第 3 步：运行你的 Python 脚本
      - name: Run python script
        run: python generate_readme.py

      # 第 4 步：将脚本生成的 README.md 提交并推送到仓库
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 添加所有改动的文件
          git add README.md history.json
          # 检查文件是否有改动，如果有改动才提交，防止因为无改动 commit 导致报错
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto update stats"
          git push